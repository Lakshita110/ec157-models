# Render blueprint: Postgres + thin web service (health + chat) + ONE nightly cron.
# The nightly job reconciles today's adherence AND plans tomorrow; same-day
# changes come through the chat interface (docs/chat.md), so no morning cron.
#
# Deploy: see DEPLOY.md. `render blueprint launch` (or New > Blueprint in the
# dashboard) creates all three from this file; then fill the sync:false secrets.

databases:
  - name: jim-db
    plan: basic-256mb          # smallest paid tier; free tiers expire after 30d
    postgresMajorVersion: "16"

services:
  - type: web
    name: jim-web
    runtime: python
    plan: starter              # 'free' also works, but cold-starts after 15m idle
    buildCommand: pip install -e .
    startCommand: uvicorn jim.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health   # migrations run on boot (app.py lifespan)
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jim-db
          property: connectionString
      - fromGroup: jim-secrets

  - type: cron
    name: jim-nightly
    runtime: python
    # CRON SCHEDULE IS UTC. 21:00 Europe/Berlin = 19:00 UTC in summer (CEST) and
    # 20:00 UTC in winter (CET). 20:00 UTC is chosen: it lands at 21:00 local in
    # winter and 22:00 local in summer — always AFTER the training day, which is
    # what matters (an earlier run would plan tomorrow before today finished).
    schedule: "0 20 * * *"
    buildCommand: pip install -e .
    startCommand: python -m jim.jobs.nightly
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jim-db
          property: connectionString
      - fromGroup: jim-secrets

envVarGroups:
  - name: jim-secrets
    envVars:
      - key: GARMIN_EMAIL
        sync: false
      # A container has no cached token store and no stdin to answer an MFA
      # prompt, so it authenticates from a session blob instead of the password:
      #   python scripts/garmin_login.py --export
      # Paste the output here. Re-run if Garmin ever invalidates the session.
      - key: GARMIN_TOKENS
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_KNEE_LOG_DB_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      # Long random string — gates the chat. Generate with:
      #   python -c "import secrets; print(secrets.token_urlsafe(32))"
      - key: CHAT_SECRET
        sync: false
      - key: APP_TIMEZONE
        value: Europe/Berlin
